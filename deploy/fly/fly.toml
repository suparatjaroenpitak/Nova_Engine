# Nova Engine — Fly.io Deployment
# Fly.io free tier: 3 shared VMs, 256MB RAM each, 3GB persistent storage
# 
# Setup:
#   flyctl launch --copy-config --dockerfile backend/docker/Nova.Api.Dockerfile
#   flyctl postgres create --name nova-db
#   flyctl volumes create nova_data --size 1
#   flyctl deploy
#
# For Redis, use fly redis create or Upstash Redis (free 10MB)

app = "nova-engine"

[[services]]
  internal_port = 5080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.concurrency]]
    type = "connections"
    hard_limit = 25
    soft_limit = 10

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    path = "/api/v1/auth/me"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:5080"
  ConnectionStrings__Postgres = "Host=localhost;Port=5432;Database=nova_engine;Username=nova;Password=${POSTGRES_PASSWORD}"
  Jwt__SigningKey = "${JWT_SIGNING_KEY}"
  Jwt__Issuer = "NovaEngine"
  Jwt__Audience = "NovaEditor"
  Cors__AllowedOrigins__0 = "https://nova-engine.fly.dev"
  MinIO__Endpoint = "fly-nova-minio.up.railway.app"	# Or use Tigris (built-in Fly.io S3-compatible storage)
  MinIO__AccessKey = "${MINIO_ACCESS_KEY}"
  MinIO__SecretKey = "${MINIO_SECRET_KEY}"
  MinIO__Bucket = "nova-assets"
  MinIO__Secure = "true"
  Seed__CreateAdmin = "true"
  Seed__AdminEmail = "admin@nova.local"
  Seed__AdminPassword = "${ADMIN_PASSWORD}"

[deploy]
  strategy = "rolling"
  healthcheck_timeout = "60s"

[[mounts]]
  source = "nova_uploads"
  destination = "/data/uploads"

[build]
  dockerfile = "backend/docker/Nova.Api.Dockerfile"
