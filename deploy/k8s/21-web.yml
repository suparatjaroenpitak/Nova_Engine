apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-web
  namespace: nova
spec:
  replicas: 2
  selector: { matchLabels: { app: nova-web } }
  template:
    metadata: { labels: { app: nova-web } }
    spec:
      containers:
        - name: web
          image: novaengine/web:latest
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            periodSeconds: 5
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: nova-web, namespace: nova }
spec:
  selector: { app: nova-web }
  ports: [{ port: 80, targetPort: 80 }]
