apiVersion: v1
kind: Secret
metadata:
  name: nova-secrets
  namespace: nova
type: Opaque
stringData:
  # REPLACE these placeholders with real values before applying.
  # This is an example only — do not commit real secrets here.
  POSTGRES_USER: "nova"
  POSTGRES_PASSWORD: "CHANGE_ME"
  ConnectionStrings__Postgres: "Host=nova-postgres;Port=5432;Database=nova_engine;Username=nova;Password=CHANGE_ME"
  ConnectionStrings__Redis: "nova-redis:6379"
  Jwt__SigningKey: "CHANGE_ME_to_a_long_random_secret_at_least_32_chars_long_123456"
  MinIO__AccessKey: "minio"
  MinIO__SecretKey: "CHANGE_ME"
