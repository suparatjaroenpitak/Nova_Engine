apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-redis
  namespace: nova
spec:
  replicas: 1
  selector: { matchLabels: { app: nova-redis } }
  template:
    metadata: { labels: { app: nova-redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: nova-redis, namespace: nova }
spec:
  selector: { app: nova-redis }
  ports: [{ port: 6379, targetPort: 6379 }]
