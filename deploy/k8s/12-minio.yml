apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nova-minio
  namespace: nova
spec:
  serviceName: nova-minio
  replicas: 1
  selector: { matchLabels: { app: nova-minio } }
  template:
    metadata: { labels: { app: nova-minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - { name: api, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          env:
            - { name: MINIO_ROOT_USER, valueFrom: { secretKeyRef: { name: nova-secrets, key: MinIO__AccessKey } } }
            - { name: MINIO_ROOT_PASSWORD, valueFrom: { secretKeyRef: { name: nova-secrets, key: MinIO__SecretKey } } }
          volumeMounts: [{ name: data, mountPath: /data }]
          readinessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: nova-minio, namespace: nova }
spec:
  selector: { app: nova-minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
