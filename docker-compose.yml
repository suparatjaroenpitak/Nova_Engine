# Nova Engine — local development stack.
# `docker compose up --build` boots everything: Postgres, Redis, MinIO, API, editor web.
services:
  postgres:
    image: postgres:16-alpine
    container_name: nova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova_postgres_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nova_engine}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nova} -d ${POSTGRES_DB:-nova_engine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nova-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: nova-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MinIO__AccessKey:-minio}
      MINIO_ROOT_PASSWORD: ${MinIO__SecretKey:-minio12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/docker/Nova.Api.Dockerfile
    container_name: nova-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:5080}
      ConnectionStrings__Postgres: ${ConnectionStrings__Postgres}
      ConnectionStrings__Redis: ${ConnectionStrings__Redis}
      Jwt__SigningKey: ${Jwt__SigningKey}
      MinIO__Endpoint: ${MinIO__Endpoint}
      MinIO__AccessKey: ${MinIO__AccessKey}
      MinIO__SecretKey: ${MinIO__SecretKey}
      MinIO__Bucket: ${MinIO__Bucket}
    ports:
      - "5080:5080"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nova-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres-data:
  redis-data:
  minio-data:
